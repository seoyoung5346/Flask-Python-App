<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevHunt — 개발자 채용공고</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c0f;
      --surface: #13151a;
      --border: #1e2129;
      --accent: #e8ff47;
      --accent2: #47c9ff;
      --text: #f0f0ec;
      --muted: #6b7280;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(232, 255, 71, 0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 680px;
      text-align: center;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(232, 255, 71, 0.3);
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 2rem;
      background: rgba(232, 255, 71, 0.05);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 300;
      margin-bottom: 3rem;
      line-height: 1.6;
    }

    .search-form {
      display: flex;
      gap: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem;
      transition: border-color 0.2s;
    }

    .search-form:focus-within {
      border-color: rgba(232, 255, 71, 0.4);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 0.7rem 1rem;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-btn {
      background: var(--accent);
      color: #0b0c0f;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.6rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .search-btn:hover { background: #d4eb30; }
    .search-btn:active { transform: scale(0.97); }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1.8rem;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .chip:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(71, 201, 255, 0.05);
    }

    .stats {
      margin-top: 4rem;
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .stat-item { text-align: center; }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">🔍 채용 검색 플랫폼</div>

    <h1>Dev<span>Hunt</span></h1>

    <p class="subtitle">
      Python, React, TypeScript… 당신의 스택에 맞는<br />채용공고를 바로 찾아보세요.
    </p>

    <form class="search-form" action="/search" method="get">
      <input
        class="search-input"
        type="text"
        name="keyword"
        placeholder="기술 스택, 포지션, 회사명 검색..."
        autocomplete="off"
        autofocus
      />
      <button class="search-btn" type="submit">검색</button>
    </form>

    <div class="chips">
      <a class="chip" href="/search?keyword=Python">Python</a>
      <a class="chip" href="/search?keyword=JavaScript">JavaScript</a>
      <a class="chip" href="/search?keyword=React">React</a>
      <a class="chip" href="/search?keyword=TypeScript">TypeScript</a>
      <a class="chip" href="/search?keyword=Rust">Rust</a>
      <a class="chip" href="/search?keyword=Go">Go</a>
      <a class="chip" href="/search?keyword=Java">Java</a>
      <a class="chip" href="/search?keyword=Flutter">Flutter</a>
      <a class="chip" href="/search?keyword=주니어">주니어</a>
      <a class="chip" href="/search?keyword=시니어">시니어</a>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-num">100+</div>
        <div class="stat-label">채용공고</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">10+</div>
        <div class="stat-label">기술 스택</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">100%</div>
        <div class="stat-label">무료 검색</div>
      </div>
    </div>
  </div>
</body>
</html>
